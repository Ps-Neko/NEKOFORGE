name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: ESLint
        run: npm run lint
      - name: dependency-cruiser
        run: npm run depcheck
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test
      - name: Benchmark
        run: npm run benchmark
