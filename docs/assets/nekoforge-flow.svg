<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NEKOFORGE local-first AI development factory flow</title>
  <desc id="desc">A flow diagram showing AI work moving through harness evidence, quality contract, deterministic gate, human gate, and explicit apply.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="80" y="104" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800">NEKOFORGE</text>
  <text x="80" y="142" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Local-first AI Development Factory: evidence first, deterministic gate, explicit apply.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="80" y="210" width="160" height="120" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="160" y="256" text-anchor="middle" fill="#312e81" font-size="22" font-weight="700">AI Work</text>
      <text x="160" y="290" text-anchor="middle" fill="#475569" font-size="16">Claude, Codex,</text>
      <text x="160" y="312" text-anchor="middle" fill="#475569" font-size="16">Cursor output</text>
    </g>
    <path d="M252 270 H310" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g filter="url(#shadow)">
      <rect x="330" y="210" width="180" height="120" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
      <text x="420" y="252" text-anchor="middle" fill="#155e75" font-size="22" font-weight="700">.harness</text>
      <text x="420" y="286" text-anchor="middle" fill="#475569" font-size="16">spec, plan, diff,</text>
      <text x="420" y="308" text-anchor="middle" fill="#475569" font-size="16">worker evidence</text>
    </g>
    <path d="M522 270 H580" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g filter="url(#shadow)">
      <rect x="600" y="210" width="190" height="120" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="695" y="252" text-anchor="middle" fill="#166534" font-size="22" font-weight="700">Quality Contract</text>
      <text x="695" y="286" text-anchor="middle" fill="#475569" font-size="16">bars, tests, risk,</text>
      <text x="695" y="308" text-anchor="middle" fill="#475569" font-size="16">required evidence</text>
    </g>
    <path d="M802 270 H860" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g filter="url(#shadow)">
      <rect x="880" y="210" width="240" height="120" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="1000" y="252" text-anchor="middle" fill="#9a3412" font-size="22" font-weight="700">Deterministic Gate</text>
      <text x="1000" y="286" text-anchor="middle" fill="#475569" font-size="16">35 rules + review</text>
      <text x="1000" y="308" text-anchor="middle" fill="#475569" font-size="16">+ test status</text>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="92" y="396" width="300" height="70" rx="14" fill="#fee2e2" stroke="#fecaca"/>
    <text x="116" y="424" fill="#991b1b" font-size="20" font-weight="750">BLOCK / INSUFFICIENT_EVIDENCE</text>
    <text x="116" y="450" fill="#7f1d1d" font-size="16">Stops before apply. No flag bypass.</text>

    <rect x="450" y="396" width="250" height="70" rx="14" fill="#fef3c7" stroke="#fde68a"/>
    <text x="475" y="424" fill="#92400e" font-size="20" font-weight="750">Human Gate</text>
    <text x="475" y="450" fill="#78350f" font-size="16">Decision hash approval token.</text>

    <rect x="758" y="396" width="330" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
    <text x="782" y="424" fill="#166534" font-size="20" font-weight="750">PASS / PASS_WITH_WARNINGS</text>
    <text x="782" y="450" fill="#14532d" font-size="16">Explicit apply only after verified evidence.</text>

    <path d="M392 431 H430" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M700 431 H738" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  </g>

  <text x="80" y="536" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">Core promise: NEKOFORGE is not an auto-coding agent; it records evidence, gates risk, and refuses unsafe apply.</text>
</svg>
